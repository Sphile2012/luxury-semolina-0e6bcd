<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Page</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Guard Ring API Test</h1>
    
    <div class="test">
        <h2>Test 1: Health Check</h2>
        <button onclick="testHealth()">Test /api/health</button>
        <div id="health-result"></div>
    </div>

    <div class="test">
        <h2>Test 2: Register</h2>
        <input type="email" id="reg-email" placeholder="Email" value="test@example.com">
        <input type="password" id="reg-password" placeholder="Password" value="password123">
        <input type="text" id="reg-name" placeholder="Full Name" value="Test User">
        <button onclick="testRegister()">Test Register</button>
        <div id="register-result"></div>
    </div>

    <div class="test">
        <h2>Test 3: Login</h2>
        <input type="email" id="login-email" placeholder="Email" value="test@example.com">
        <input type="password" id="login-password" placeholder="Password" value="password123">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result"></div>
    </div>

    <script>
        async function testHealth() {
            const result = document.getElementById('health-result');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                result.innerHTML = `
                    <div class="success">
                        <strong>✅ Success (${response.status})</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <strong>❌ Error</strong>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testRegister() {
            const result = document.getElementById('register-result');
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const full_name = document.getElementById('reg-name').value;
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name })
                });
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <div class="success">
                            <strong>✅ Success (${response.status})</strong>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    result.innerHTML = `
                        <div class="error">
                            <strong>⚠️ Response (${response.status})</strong>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <strong>❌ Error</strong>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testLogin() {
            const result = document.getElementById('login-result');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <div class="success">
                            <strong>✅ Success (${response.status})</strong>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    localStorage.setItem('panic_ring_token', data.token);
                } else {
                    result.innerHTML = `
                        <div class="error">
                            <strong>⚠️ Response (${response.status})</strong>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <strong>❌ Error</strong>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        // Auto-test on page load
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>
